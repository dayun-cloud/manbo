<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>曼波配音生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #e0e0e0;
        }

        .container {
            background: #2d2d44;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            border: 1px solid #3d3d5c;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #e0e0e0;
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #65a6bc, #87cfde);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: #b0b0b0;
            font-size: 1.1em;
        }

        .input-section {
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #e0e0e0;
            font-weight: 600;
        }

        .input-group textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #3d3d5c;
            border-radius: 10px;
            font-size: 16px;
            resize: none;
            height: 240px;
            transition: border-color 0.3s;
            background: #1a1a2e;
            color: #e0e0e0;
        }

        .input-group textarea:focus {
            outline: none;
            border-color: #87cfde;
        }

        .input-group textarea::-webkit-scrollbar {
            width: 8px;
        }

        .input-group textarea::-webkit-scrollbar-track {
            background: #2d2d44;
            border-radius: 4px;
        }

        .input-group textarea::-webkit-scrollbar-thumb {
            background: #3d3d5c;
            border-radius: 4px;
        }

        .input-group textarea::-webkit-scrollbar-thumb:hover {
            background: #4d4d6c;
        }

        .input-group textarea::placeholder {
            color: #888;
        }


        .generate-btn {
            width: 100%;
            background: linear-gradient(90deg, #65a6bc, #87cfde);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.3s;
            font-weight: 600;
        }

        .generate-btn:hover {
            transform: translateY(-2px);
        }

        .generate-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .result-section {
            display: none;
            margin-top: 30px;
            padding: 20px;
            background: #1a1a2e;
            border-radius: 10px;
            border: 1px solid #3d3d5c;
        }

        .result-section.success {
            background: #1a1a2e;
            border: 1px solid #3d3d5c;
        }

        .result-section.error {
            background: #2e1a1a;
            border: 1px solid #5a2d2d;
        }

        .audio-player {
            margin: 20px 0;
        }

        .audio-player audio {
            width: 100%;
            height: 50px;
        }


        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading-spinner {
            border: 4px solid #3d3d5c;
            border-top: 4px solid #87cfde;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: #2e1a1a;
            color: #ff6b6b;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            border: 1px solid #5a2d2d;
        }

        .success-message {
            background: transparent;
            color: #87cfde;
            padding: 0px 0 15px 0px;
            border-radius: 8px;
            margin: 15px 0;
            border: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .copy-btn {
            background: linear-gradient(90deg, #65a6bc, #87cfde);
            color: #1a1a2e;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .copy-btn:hover {
            transform: translateY(-2px);
        }

    
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            
            .header h1 {
                font-size: 2em;
            }
            
            .download-links {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎵 曼波配音生成器</h1>
        </div>

        <div class="input-section">
            <div class="input-group">
                <label for="textInput">输入要转换的文字：</label>
                <textarea id="textInput" placeholder="请输入您想要转换为语音的文字..."></textarea>
            </div>

            <button class="generate-btn" onclick="generateSpeech()">🎤 生成语音</button>
        </div>

        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <p>正在生成语音，请稍候...</p>
        </div>

        <div class="result-section" id="resultSection">
            <div id="resultContent"></div>
        </div>
    </div>

    <script>

        async function generateSpeech() {
            const text = document.getElementById('textInput').value.trim();
            
            if (!text) {
                alert('请输入要转换的文字！');
                return;
            }

            const loading = document.getElementById('loading');
            const resultSection = document.getElementById('resultSection');
            const generateBtn = document.querySelector('.generate-btn');

            loading.style.display = 'block';
            resultSection.style.display = 'none';
            generateBtn.disabled = true;

            try {
                const encodedText = encodeURIComponent(text);
                const apiUrl = `https://api.milorapart.top/apis/mbAIsc?text=${encodedText}`;
                
                const response = await fetch(apiUrl);
                const data = await response.json();
                
                if (data.code === 200 && data.url) {
                    showSuccess(data.url, text);
                } else {
                    showError(data.msg || '生成失败，请重试');
                }
            } catch (error) {
                console.error('请求失败:', error);
                showError('网络请求失败，请检查网络连接');
            } finally {
                loading.style.display = 'none';
                generateBtn.disabled = false;
            }
        }

        function showSuccess(audioUrl, text) {
            const resultSection = document.getElementById('resultSection');
            const resultContent = document.getElementById('resultContent');
            
            resultSection.className = 'result-section success';
            resultContent.innerHTML = `
                <div class="success-message">
                    <h3>✅ 语音生成成功！</h3>
                    <button class="copy-btn" onclick="copyLink('${audioUrl}')">📋 复制链接</button>
                </div>
                
                <div class="audio-player">
                    <audio controls>
                        <source src="${audioUrl}" type="audio/mpeg">
                        您的浏览器不支持音频播放。
                    </audio>
                </div>
            `;
            
            resultSection.style.display = 'block';
        }

        function showError(message) {
            const resultSection = document.getElementById('resultSection');
            const resultContent = document.getElementById('resultContent');
            
            resultSection.className = 'result-section error';
            resultContent.innerHTML = `
                <div class="error-message">
                    <h3>❌ 生成失败</h3>
                    <p>${message}</p>
                </div>
            `;
            
            resultSection.style.display = 'block';
        }


        function copyLink(audioUrl) {
            const copyBtn = document.querySelector('.copy-btn');
            
            if (copyBtn.textContent === '✅ 已复制') {
                return;
            }
            
            navigator.clipboard.writeText(audioUrl).then(function() {
                const originalText = copyBtn.textContent;
                copyBtn.textContent = '✅ 已复制';
                
                setTimeout(function() {
                    copyBtn.textContent = originalText;
                }, 2000);
            }).catch(function(err) {
                console.error('复制失败:', err);
                alert('复制失败，请手动复制链接');
            });
        }

    </script>
</body>
</html>
